<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mix Snacks - Catálogo Comercial</title>
    <link rel="icon" type="images/x-icon" href="./logo/sdn.png" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <img src="./logo/sdn1.png" alt="Logo da SDN" />
        <div class="header-left">
          <h1>Mix Snacks</h1>
          <p>Catálogo Comercial</p>
        </div>
        <button id="addProductBtn" class="btn-add-product">
          <span>+</span> Novo Produto
        </button>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Pesquisar produto (ex.: Coca-Cola, Trakinas, Água...)"
        />
      </div>
    </header>

    <!-- Categories -->
    <nav class="categories">
      <button class="category-btn active" data-category="all">Todos</button>
      <button class="category-btn" data-category="Doces">Doces</button>
      <button class="category-btn" data-category="Salgados">Salgados</button>
      <button class="category-btn" data-category="Bebidas">Bebidas</button>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div class="products-container" id="productsContainer">
        <!-- Products will be inserted here by JavaScript -->
      </div>
    </main>

    <!-- Product Detail Modal -->
    <div id="productModal" class="modal">
      <div class="modal-content">
        <button class="modal-close" id="modalCloseBtn">&times;</button>
        <div class="modal-body">
          <div class="modal-image">
            <img id="modalImage" src="" alt="Produto" />
          </div>
          <div class="modal-info">
            <h2 id="modalTitle"></h2>
            <p id="modalCategory" class="modal-category"></p>
            <p id="modalPrice" class="modal-price"></p>
            <p id="modalDescription" class="modal-description"></p>

            <div class="modal-nutrition">
              <h3>Informação Nutricional</h3>
              <table class="nutrition-table">
                <tr>
                  <td>Calorias:</td>
                  <td id="modalCalories"></td>
                </tr>
                <tr>
                  <td>Proteína:</td>
                  <td id="modalProtein"></td>
                </tr>
                <tr>
                  <td>Carboidratos:</td>
                  <td id="modalCarbs"></td>
                </tr>
                <tr>
                  <td>Gordura:</td>
                  <td id="modalFat"></td>
                </tr>
                <tr>
                  <td>Fibra:</td>
                  <td id="modalFiber"></td>
                </tr>
                <tr>
                  <td>Sódio:</td>
                  <td id="modalSodium"></td>
                </tr>
              </table>
            </div>

            <div class="modal-actions">
              <button id="editProductBtn" class="btn-edit">Editar</button>
              <button id="deleteProductBtn" class="btn-delete">Deletar</button>
              <button id="closeModalBtn" class="btn-close">Fechar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="formModal" class="modal">
      <div class="modal-content form-modal">
        <button class="modal-close" id="formCloseBtn">&times;</button>
        <h2 id="formTitle">Novo Produto</h2>

        <form id="productForm">
          <div class="form-tabs">
            <button type="button" class="form-tab active" data-tab="basic">
              Informações Básicas
            </button>
            <button type="button" class="form-tab" data-tab="nutrition">
              Nutrição
            </button>
          </div>

          <!-- Basic Info Tab -->
          <div class="form-tab-content active" id="basicTab">
            <div class="form-group">
              <label for="productName">Nome do Produto *</label>
              <input
                type="text"
                id="productName"
                placeholder="Ex: Coca Cola 350ml"
                required
              />
            </div>

            <div class="form-group">
              <label for="productCategory">Categoria *</label>
              <select id="productCategory" required>
                <option value="">Selecione uma categoria</option>
                <option value="Doces">Doces</option>
                <option value="Salgados">Salgados</option>
                <option value="Bebidas">Bebidas</option>
              </select>
            </div>

            <div class="form-group">
              <label for="productPrice">Preço (R$) *</label>
              <input
                type="text"
                inputmode="numeric"
                pattern="[0-9]*"
                id="productPrice"
                placeholder="0.00"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label for="productImage">URL da Imagem</label>
              <input type="text" id="productImage" placeholder="https://..." />
            </div>

            <div class="form-group">
              <label for="productDescription">Descrição</label>
              <textarea
                id="productDescription"
                placeholder="Descrição do produto"
              ></textarea>
            </div>
          </div>

          <!-- Nutrition Tab -->
          <div class="form-tab-content" id="nutritionTab">
            <div class="form-group">
              <label for="productCalories">Calorias</label>
              <input
                type="text"
                id="productCalories"
                placeholder="Ex: 100 kcal"
              />
            </div>

            <div class="form-group">
              <label for="productProtein">Proteína</label>
              <input type="text" id="productProtein" placeholder="Ex: 5g" />
            </div>

            <div class="form-group">
              <label for="productCarbs">Carboidratos</label>
              <input type="text" id="productCarbs" placeholder="Ex: 20g" />
            </div>

            <div class="form-group">
              <label for="productFat">Gordura</label>
              <input type="text" id="productFat" placeholder="Ex: 2g" />
            </div>

            <div class="form-group">
              <label for="productFiber">Fibra</label>
              <input type="text" id="productFiber" placeholder="Ex: 1g" />
            </div>

            <div class="form-group">
              <label for="productSodium">Sódio</label>
              <input type="text" id="productSodium" placeholder="Ex: 100mg" />
            </div>
          </div>

          <div class="form-actions">
            <button type="button" id="formCancelBtn" class="btn-cancel">
              Cancelar
            </button>
            <button type="submit" class="btn-submit">Adicionar Produto</button>
          </div>
        </form>
      </div>
    </div>

    <footer>
      <span> Copyright ® SDN. </span>
      <span> Todos os direitos reservados. </span>
    </footer>

    <script src="./js/script.js"></script>
  </body>
</html>
